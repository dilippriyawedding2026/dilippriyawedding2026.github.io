<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wedding Invitation</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to bottom, #fffaf5, #fdf2f8);
      color: #4a2c2a;
      text-align: center;
      padding: 40px 20px;
    }

    .invite-card {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 50px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      color: #b76e79;
      margin-bottom: 30px;
    }

    .names {
      font-size: 2.5em;
      margin: 20px 0;
      color: #8b3a3a;
    }

    .details {
      font-size: 1.2em;
      line-height: 1.8;
      margin-top: 30px;
    }

    .footer {
      margin-top: 40px;
      font-style: italic;
      color: #7a5c58;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2em;
      }
      .names {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="invite-card">
    <h1>Wedding Invitation</h1>
    <h2>Together with our families</h2>

    <div class="names">
      Priya <br> & <br> [Partner Name]
    </div>

    <div class="details">
      Request the pleasure of your company<br>
      at our wedding celebration<br><br>

      📅 Date: [Your Date]<br>
      🕒 Time: [Your Time]<br>
      📍 Venue: [Your Venue]<br>
    </div>

    <div class="footer">
      We would be delighted to celebrate with you 💐
    </div>
  </div>
</body>
</html>
