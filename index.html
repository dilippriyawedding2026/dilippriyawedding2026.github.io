<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #fff5f7, #fdf6e3);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.95);
      padding: 60px 40px;
      max-width: 750px;
      width: 90%;
      text-align: center;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      border: 2px solid rgba(183,110,121,0.15);
      animation: fadeIn 2s ease;
    }

    .top-text {
      font-size: 1.1em;
      letter-spacing: 2px;
      color: #b76e79;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 3.5em;
      margin: 10px 0;
      color: #8b3a3a;
    }

    .divider {
      font-size: 2em;
      color: #d4a373;
      margin: 20px 0;
    }

    .names {
      font-size: 2.8em;
      color: #5c2a2a;
      line-height: 1.4;
      margin-bottom: 25px;
    }

    .invite-text {
      font-size: 1.2em;
      color: #555;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .details {
      font-size: 1.15em;
      line-height: 2;
      color: #444;
      background: #fffaf5;
      padding: 25px;
      border-radius: 16px;
      margin-top: 25px;
    }

    .footer {
      margin-top: 35px;
      font-style: italic;
      color: #8c6d62;
      font-size: 1.05em;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width:600px) {
      h1 {
        font-size: 2.4em;
      }

      .names {
        font-size: 2em;
      }

      .card {
        padding: 40px 20px;
      }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="top-text">Together with our families</div>

  <h1>Wedding Invitation</h1>

  <div class="divider">❦</div>

  <div class="names">
    Dilip <br> & <br> Priya
  </div>

  <div class="invite-text">
    joyfully invite you to celebrate our wedding ceremony<br>
    and share in the happiness of our special day
  </div>

  <div class="details">
    📅 <b>Date:</b> 06 June 2026 <br>
    🕒 <b>Time:</b> 6 PM <br>
    📍 <b>Venue:</b> Legacy Event Center, Monroeville, PA
  </div>

  <div class="footer">
    We look forward to celebrating with you ✨
  </div>
</div>

</body>
</html>
